<!DOCTYPE html>
<html>
<head>
    <title>EAUH Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>EAUH - Connection Test</h1>
    <div id="step1">Step 1: Creating Supabase client...</div>
    <div id="step2"></div>
    <div id="step3"></div>
    <div id="result"></div>

    <script>
    const SUPABASE_URL = 'https://rnlutvfzmnnxihgwcymw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJubHV0dmZ6bW5ueGloZ3djeW13Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjAxMDcsImV4cCI6MjA4OTc5NjEwN30.2RfFEacIgG2XnvVRBFjcTELO26nt4T3zJP3v8-0JgTM';
    
    async function runTest() {
        try {
            // Step 1: Create client
            document.getElementById('step1').innerHTML = '✅ Step 1: Supabase client created';
            
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // Step 2: Test users table
            document.getElementById('step2').innerHTML = 'Step 2: Testing users table...';
            const { data: users, error: usersError } = await supabase.from('users').select('*');
            
            if (usersError) {
                document.getElementById('step2').innerHTML = '❌ Step 2 FAILED: ' + usersError.message;
                document.getElementById('result').innerHTML = '<pre style="color:red">Error: ' + JSON.stringify(usersError, null, 2) + '</pre>';
                return;
            }
            
            document.getElementById('step2').innerHTML = `✅ Step 2: Found ${users.length} users`;
            
            // Step 3: Test students table
            document.getElementById('step3').innerHTML = 'Step 3: Testing students table...';
            const { data: students, error: studentsError } = await supabase.from('students').select('*');
            
            if (studentsError) {
                document.getElementById('step3').innerHTML = '❌ Step 3 FAILED: ' + studentsError.message;
                return;
            }
            
            document.getElementById('step3').innerHTML = `✅ Step 3: Found ${students.length} students`;
            
            // Show results
            document.getElementById('result').innerHTML = `
                <div style="background-color: #d4edda; padding: 20px; margin-top: 20px; border-radius: 8px;">
                    <h2 style="color: #155724;">✅ CONNECTION SUCCESSFUL!</h2>
                    <p><strong>Users in database:</strong></p>
                    <ul>${users.map(u => `<li>${u.username} (${u.role}) - Password: ${u.password}</li>`).join('')}</ul>
                    <p><strong>Students:</strong> ${students.length} found</p>
                    <hr>
                    <p><strong>You can now log in with:</strong></p>
                    <ul>
                        <li>admin / 4141</li>
                        <li>eval1 / pass</li>
                        <li>student1 / pass</li>
                    </ul>
                </div>
            `;
            
        } catch (err) {
            document.getElementById('result').innerHTML = `<pre style="color:red">Exception: ${err.message}</pre>`;
        }
    }
    
    runTest();
    </script>
</body>
</html>
